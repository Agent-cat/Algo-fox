<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Safe Exam</title>
  <style>
    body {
      width: 250px;
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 20px;
      text-align: center;
      margin: 0;
      background-color: #fafafa;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #333;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .active {
      background-color: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.1);
    }

    .inactive {
      background-color: #dcfce3;
      color: #15803d;
      border: 1px solid #86efac;
      box-shadow: 0 4px 6px -1px rgba(34, 197, 94, 0.1);
    }

    .desc {
      font-size: 13px;
      color: #666;
      margin-top: 15px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <h2>Safe Exam Mode</h2>
  <div id="statusIndicator" class="status inactive">INACTIVE</div>
  <p class="desc" id="statusDesc">Your browser is not currently restricted. Good luck on your next test!</p>
  <script src="popup.js"></script>
</body>

</html>
