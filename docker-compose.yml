services:
  postgres:
    image: postgres:16-alpine
    container_name: algofox-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: algofox
      POSTGRES_PASSWORD: algofox
      POSTGRES_DB: algofox
    # PERF: Increase max_connections for PgBouncer and tune shared_buffers
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algofox -d algofox"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g

  # PERF: PgBouncer sits between the app and Postgres.
  # In transaction mode, it pools N app connections into far fewer real PG connections.
  # At 10K concurrent users, this is the single highest-impact infra change.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: algofox-pgbouncer
    ports:
      - "5433:5432"
    environment:
      DATABASE_URL: "postgres://algofox:algofox@postgres:5432/algofox"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY: "DISCARD ALL"
      # Disable prepared statements — incompatible with transaction-mode pooling
      MAX_PREPARED_STATEMENTS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U algofox"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m

  redis:
    image: redis:7-alpine
    container_name: algofox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  app:
    image: agentcat1/algofox
    build:
      context: .
      dockerfile: Dockerfile
      # network: host allows the build phase to connect to the DB you just started on localhost:5432
      network: host
      args:
        # Use localhost during build to reach the host-mapped DB ports
        - DATABASE_URL=postgresql://algofox:algofox@localhost:5432/algofox
        - BETTER_AUTH_SECRET=zpN6vAuvJwJ79IkeWIOPlwUoA5M1F2HG
    container_name: algofox-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # PERF: Route through PgBouncer (port 5433) instead of direct Postgres.
      # This reduces connection count from N_requests to DEFAULT_POOL_SIZE (20).
      - DATABASE_URL=postgresql://algofox:algofox@pgbouncer:5432/algofox
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      # All secrets (BETTER_AUTH_SECRET, OAuth client secrets, TELEGRAM_BOT_TOKEN, etc.)
      # are loaded from the .env file below — never hardcode them here.
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2"

volumes:
  # Standard volume creation for persistence
  postgres_data:
  redis_data:
